<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaens Beauty</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="login" class="form-body">
    <p class="text">Bienvenidos Jaens Beauty</p>

    <form class="login-form">
        <img src="https://i.pinimg.com/736x/b9/62/69/b96269e616b61dc8223a235e069556be.jpg" alt="perfil">
        <input type="text" id="loginUser" placeholder="Email o nombre de usuario">
        <input type="password" id="loginPass" placeholder="Contraseña">
        <button type="button" onclick="iniciarSesion()">Iniciar</button>
    </form>

    <p>¿No tienes cuenta?
        <a href="#" onclick="mostrarRegistro()">Regístrate aquí</a>
    </p>
</div>

<div id="registro" class="form-body" style="display:none;">
    <h2>Crear Cuenta</h2>

    <form>
    <input type="text" id="nombre" placeholder="Nombre">
    <input type="text" id="apellido" placeholder="Apellido">
    <input type="text" id="correo" placeholder="Correo">
    <input type="text" id="direccion" placeholder="Dirección">
    <input type="text" id="numero" placeholder="Telefono">
    <input type="password" id="contraseña" placeholder="Contraseña">

        <button type="button" onclick="registrar()">Registrarse</button>

    </form>

    <p>¿Ya tienes cuenta?
        <a href="#" onclick="mostrarLogin()">Inicia sesión</a>
    </p>

</div>

<div id="pantalla-usuario" style="display:none;">
    <h2>Bienvenido a Jaens Beauty</h2>
    <button onclick="cerrarSesion()">Ir a pagina principal</button>
</div>
<script src="scrip.js"></script>

</body>
</html>
